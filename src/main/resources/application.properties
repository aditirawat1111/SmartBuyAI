# Server Configuration
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/smartbuy_ai
spring.datasource.username=root
spring.datasource.password=Ritwik@9064
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Application Configuration
spring.application.name=SmartBuy

# Price simulation scheduler (see docs/PRICE_SIMULATION_SCHEDULER.md)
smartbuy.scheduler.page-size=100
smartbuy.scheduler.min-price-factor=0.50
smartbuy.scheduler.max-price-factor=1.50
smartbuy.scheduler.cron=0 1 0 * * ?

smartbuy.scheduler.simulation.weekend-adjustment=-0.045
smartbuy.scheduler.simulation.demand-max-scale=0.035
smartbuy.scheduler.simulation.competitor-higher-than-min=-0.05
smartbuy.scheduler.simulation.competitor-lower-than-min=0.02
smartbuy.scheduler.simulation.noise-half-range=0.01
smartbuy.scheduler.simulation.default-rating=2.5
smartbuy.scheduler.simulation.rating-scale-divisor=5

smartbuy.scheduler.retry.max-attempts=3
smartbuy.scheduler.retry.backoff-ms=500

spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
